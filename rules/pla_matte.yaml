name: PLA Matte surface pass
description: >
  Matte PLA usually benefits from a calmer outer shell and top surface. This
  recipe catches spool profiles with Matte in the settings id and takes
  precedence over the baseline PLA guardrail.
match:
  filament_settings_id_contains: Matte
  filament_vendor: Bambu Lab
  filament_type: PLA
overrides:
  outer_wall_speed: 100
  inner_wall_speed: 200
  sparse_infill_speed: 200
  internal_solid_infill_speed: 200
  top_surface_speed: 80
  gap_infill_speed: 80
  default_acceleration: 4000
  outer_wall_acceleration: 2000
  inner_wall_acceleration: 4000
  initial_layer_acceleration: 500
priority: 10
enabled: true
