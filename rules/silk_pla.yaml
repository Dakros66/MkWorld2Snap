name: Silk PLA gloss pass
description: >
  Silk PLA gets a gentler movement profile to protect gloss and reduce ringing
  on visible walls. Treat this as a starting point and tune per spool from the
  recipe workbench when a model needs it.
match:
  filament_settings_id_contains: Silk
  filament_vendor: Bambu Lab
  filament_type: PLA
overrides:
  outer_wall_speed: 80
  inner_wall_speed: 150
  sparse_infill_speed: 150
  internal_solid_infill_speed: 150
  top_surface_speed: 80
  gap_infill_speed: 80
  default_acceleration: 3000
  outer_wall_acceleration: 2000
  inner_wall_acceleration: 3000
  initial_layer_acceleration: 500
priority: 10
enabled: true
