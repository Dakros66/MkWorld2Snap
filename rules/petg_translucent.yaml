name: PETG Translucent clarity pass
description: >
  Translucent PETG is sensitive to fast movement. This recipe favours clarity
  and consistent bonding over print time when the source package identifies a
  translucent PETG spool.
match:
  filament_settings_id_contains: PETG Translucent
  filament_vendor: Bambu Lab
  filament_type: PETG
overrides:
  outer_wall_speed: 80
  inner_wall_speed: 150
  sparse_infill_speed: 180
  internal_solid_infill_speed: 150
  top_surface_speed: 70
  gap_infill_speed: 80
  default_acceleration: 3000
  outer_wall_acceleration: 2000
  inner_wall_acceleration: 3000
  initial_layer_acceleration: 500
  nozzle_temperature_initial_layer: ['260', '260', '260', '260']
  nozzle_temperature: ['260', '260', '260', '260']
priority: 11
enabled: true
